version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./recruitflow.db
      MODEL_PATH: ml/models/fit_model.joblib
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./:/app
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api
